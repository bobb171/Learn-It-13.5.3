name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libffi-dev libssl-dev python3-setuptools libncurses5-dev libncursesw5-dev zlib1g-dev cpuid libreadline-dev libsqlite3-dev libssl-dev tk-dev libgdbm-dev libc6-dev libbz2-dev libffi-dev
          pip install --user --upgrade buildozer cython virtualenv

      - name: Build APK
        run: |
          # Adding the local bin to PATH so GitHub can find Buildozer
          export PATH=$PATH:$HOME/.local/bin
          # This command accepts the Android SDK licenses automatically
          yes | buildozer -v android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LearnIt-Package
          path: bin/*.apk
